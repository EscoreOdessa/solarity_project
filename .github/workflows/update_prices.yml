name: Оновлення цін СЕС

# Коли запускати:
on:
  schedule:
    # 1-го та 15-го числа кожного місяця о 01:00 UTC (≈ 03:00–04:00 за Києвом).
    # Це приблизно «раз на два тижні вночі». Час — UTC; за потреби зміни цифри.
    - cron: "0 1 1,15 * *"
  workflow_dispatch: {}   # кнопка ручного запуску у вкладці Actions

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Завантажити код
        uses: actions/checkout@v4

      - name: Налаштувати Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Встановити залежності
        run: pip install -r requirements.txt

      - name: Оновити ціни
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_URL: ${{ secrets.SHEET_URL }}
        run: python price_finder.py
